language: go
go:
  - stable

env:
  - GO111MODULE=on

jobs:
  include:
    - stage: unit
      script:
        - make test
    - stage: integration
      install:
        - curl -L -OJ https://github.com/rancher/cli/releases/download/v2.4.0/rancher-linux-amd64-v2.4.0.tar.gz
        - tar xvzf rancher-*
        - sudo install ./rancher-*/rancher /usr/local/bin/rancher

      before_script:
        - rancher login --skip-verify -t $RANCHER_TOKEN https://185.79.233.18/v3
        - rancher clusters create integration

      script:
        - echo hello

      after_script:
        - rancher cluster rm integration
